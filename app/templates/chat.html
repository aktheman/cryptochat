<!doctype html>
<html>
  <head><meta charset="utf-8"/><title>CryptoChat</title></head>
  <body>
    <h1>CryptoChat – {{ username }}</h1>
    <button id="users">Last brukere</button>
    <pre id="out"></pre>
    <script>
      document.getElementById('users').addEventListener('click', async () => {
        const r = await fetch('/users');
        document.getElementById('out').textContent = r.status + '\\n' + await r.text();
      });
    </script>
    <form id="logout"><button>Logg ut</button></form>
    <script>
      document.getElementById('logout').addEventListener('submit', async (e) => {
        e.preventDefault();
        const r = await fetch('/auth/logout', {method:'POST'});
        if (r.ok) location.href = '/login';
      });
    </script>
  </body>
</html>
