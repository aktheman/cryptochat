<!doctype html>
<html>
  <head><meta charset="utf-8"/><title>CryptoChat Login</title></head>
  <body>
    <h1>CryptoChat</h1>
    <form id="login">
      <input id="username" placeholder="Brukernavn" required/>
      <input id="password" placeholder="Passord" type="password" required/>
      <button>Logg inn / Registrer</button>
    </form>
    <pre id="out"></pre>
    <script>
      const form = document.getElementById('login');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        const res = await fetch('/auth/register', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:u,password:p})});
        if (res.status === 409) {
          const lr = await fetch('/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username:u,password:p})});
          document.getElementById('out').textContent = lr.status + ' ' + await lr.text();
          if (lr.ok) location.href = '/chat';
          return;
        }
        document.getElementById('out').textContent = res.status + ' ' + await res.text();
        if (res.ok) location.href = '/chat';
      });
    </script>
  </body>
</html>
