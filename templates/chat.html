<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1424" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CryptoChat" />
  <meta name="description" content="Ende-til-ende-kryptert chat" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>CryptoChat</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/static/img/icon-192.png" />
  <link rel="stylesheet" href="/static/css/style.css?v=13" />
</head>
<body data-username="{{ username }}" data-turn-url="{{ turn_url }}" data-turn-user="{{ turn_user }}">
  <div id="app" class="app">
    <div class="loading-screen">
      <div class="loading-inner">
        <div class="loading-icon">🔐</div>
        <div class="loading-brand">CryptoChat</div>
        <div class="loading-label">Laster...</div>
      </div>
    </div>
  </div>
  <div id="installBanner" class="install-banner">
    <span class="install-banner-label">Installer CryptoChat</span>
    <div class="install-banner-actions">
      <button id="installAcceptBtn" class="btn btn-primary btn-small">Installer</button>
      <button id="installDismissBtn" class="btn btn-ghost btn-small">Avvis</button>
    </div>
  </div>

  <script src="/static/js/bootstrap.js"></script>
  <script src="/static/js/crypto.js" defer></script>
  <script src="/static/js/chat.js?v=12" defer></script>
</body>
</html>
