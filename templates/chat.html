<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CryptoChat</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><h1>CryptoChat</h1></div>
      <button id="logoutBtn">Logg ut</button>
      <div class="section">
        <div class="section-title">MELDINGER</div>
        <div id="users" class="list"></div>
      </div>
      <div class="section">
        <div class="section-title">GRUPPER</div>
        <button id="createGroupBtn">+ Ny gruppe</button>
        <div id="groups" class="list"></div>
      </div>
      <div class="section">
        <button id="themeBtn">Tema</button>
        <button id="fa2Btn">2FA</button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <div>
          <div class="chat-title" id="chatTitle">Velg en samtale</div>
          <div class="chat-meta" id="chatMeta"></div>
        </div>
        <div class="chat-actions">
          <input id="searchPartner" placeholder="Partner" />
          <input id="searchInput" placeholder="Søk..." />
          <button id="searchBtn">Søk</button>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <div class="composer" id="composer" style="display:none">
        <input type="file" id="fileInput" />
        <input type="hidden" id="recipient" />
        <div class="composer-row">
          <input id="messageInput" placeholder="Skriv..." />
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </main>
  </div>

  <div id="status" class="status" style="display:none"></div>

  <div id="current-user" style="display:none">{{ username | tojson }}</div>

  <script>
    window.__APP__ = { username: {{ username | tojson }} };
  </script>
  <script src="/static/js/chat.js" defer></script>
</body>
</html>
