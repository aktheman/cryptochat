<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1424" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>CryptoChat</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/static/css/style.css?v=10" />
</head>
<body>
  <div id="app" class="app"></div>

  <script>
    window.__APP__ = {
      username: {{ username | tojson }},
      partnerKeys: localStorage.getItem('partnerKeys') ? JSON.parse(localStorage.getItem('partnerKeys')) : {},
      theme: localStorage.getItem('theme') || 'dark'
    };
  </script>
  <script src="/static/js/chat.js?v=10" defer></script>
</body>
</html>
