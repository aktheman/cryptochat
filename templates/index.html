<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoChat - Kryptert meldinger</title>
    <link rel="stylesheet" href="/static/css/style.css?v=14">
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <h1>CryptoChat</h1>
            <p class="subtitle">Kryptert meldinger</p>

            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Logg inn</button>
                <button class="tab-btn" data-tab="register">Registrer</button>
            </div>

            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Brukernavn" required autocomplete="username">
                <input type="password" id="loginPassword" placeholder="Passord" required autocomplete="current-password">
                <button type="submit" class="btn-primary">Logg inn</button>
            </form>

            <form id="registerForm" class="form-hidden">
                <input type="text" id="registerUsername" placeholder="Brukernavn (minst 3 tegn)" required autocomplete="username">
                <input type="password" id="registerPassword" placeholder="Passord (minst 4 tegn)" required autocomplete="new-password">
                <button type="submit" class="btn-primary">Registrer</button>
            </form>

            <div id="authMessage" class="message-box"></div>
        </div>
    </div>

    <script src="/static/js/index.js?v=14"></script>
</body>
</html>
