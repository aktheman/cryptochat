<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CryptoChat Admin</title>
  <link rel="stylesheet" href="/static/css/admin.css?v=14">
</head>
<body>
  <div class="admin-header">
    <h1>CryptoChat Admin</h1>
    <a href="/chat" class="btn btn-ghost">Tilbake til chat</a>
  </div>
  <div class="admin-container">
    <div class="stats" id="stats"></div>
    <div class="admin-tabs">
      <button class="admin-tab active" data-section="users">Brukere</button>
      <button class="admin-tab" data-section="messages">Meldinger</button>
    </div>
    <div id="users" class="section active">
      <table><thead><tr><th>Brukernavn</th><th>Navn</th><th>Admin</th><th>2FA</th><th>Opprettet</th><th>Handlinger</th></tr></thead><tbody id="usersTable"></tbody></table>
    </div>
    <div id="messages" class="section">
      <table><thead><tr><th>Sendt</th><th>Til</th><th>Type</th><th>Tid</th></tr></thead><tbody id="msgsTable"></tbody></table>
    </div>
  </div>
  <script src="/static/js/admin.js?v=14"></script>
</body>
</html>
