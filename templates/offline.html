<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>CryptoChat - Frakoblet</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin:0;
        background:#0f1424;
        color:#e7e8f3;
        font-family: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,sans-serif;
      }
      .wrap {
        min-height: 100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding: 24px;
      }
      .card {
        background:#111322;
        border:1px solid #151d30;
        border-radius:16px;
        padding:24px;
        max-width:420px;
        width:100%;
        text-align:center;
      }
      h1 { margin: 12px 0 8px; color:#cf6fef; }
      p { color:#9ca3c7; }
      .btn {
        background:#1c1030;
        color:#f3f1ff;
        border-color:#7a3bff;
        padding:10px 14px;
        border-radius:10px;
        cursor:pointer;
      }
    </style>
</head>
<body>
    <div class="wrap">
      <div class="card">
        <div style="font-size:32px;">📡</div>
        <h1>Frakoblet</h1>
        <p>Du ser ut til å være frakoblet internett. Noen funksjoner kan være utilgjengelige.</p>
        <button class="btn" onclick="location.reload()">Prøv igjen</button>
      </div>
    </div>
</body>
</html>
