<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CryptoChat</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <main class="page">
    <div class="container-center">
      <div class="auth-card">
        <div class="brand">
          <h1>CryptoChat</h1>
          <p class="subtitle">Ende-til-ende-kryptert meldinger</p>
        </div>
        <div class="tabs">
          <button class="tab-btn active" id="tab-register" onclick="switchTab('register')">Registrer</button>
          <button class="tab-btn" id="tab-login" onclick="switchTab('login')">Logg inn</button>
        </div>

        <form id="form-register">
          <div class="field">
            <label for="register-username">Brukernavn</label>
            <input id="register-username" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="register-password">Passord</label>
            <input id="register-password" type="password" autocomplete="new-password" required />
          </div>
          <div class="actions">
            <button class="btn btn-primary" type="submit">Registrer</button>
          </div>
        </form>

        <form id="form-login" style="display:none;">
          <div class="field">
            <label for="login-username">Brukernavn</label>
            <input id="login-username" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="login-password">Passord</label>
            <input id="login-password" type="password" autocomplete="current-password" required />
          </div>
          <div class="actions">
            <button class="btn btn-primary" type="submit">Logg inn</button>
          </div>
        </form>

        <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
      </div>
    </div>
  </main>

  <script>
    function showFeedback(message, type = 'error') {
      const el = document.getElementById('feedback');
      el.textContent = message;
      el.className = 'feedback ' + type;
      el.style.display = 'block';
    }

    function switchTab(tab) {
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('feedback').style.display = 'none';
    }

    async function postJSON(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {}),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || data.error || `HTTP ${res.status}`);
      return data;
    }

    document.getElementById('form-register').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('register-username').value.trim();
      const password = document.getElementById('register-password').value;
      try {
        showFeedback('Registrerer...', 'loading');
        await postJSON('/auth/register', { username, password });
        showFeedback('Registrert! Logger inn...', 'success');
        setTimeout(() => {
          window.location.href = '/chat';
        }, 500);
      } catch (err) {
        showFeedback('Registrering feilet: ' + err.message);
      }
    });

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      try {
        showFeedback('Logger inn...', 'loading');
        await postJSON('/auth/login', { username, password });
        window.location.href = '/chat';
      } catch (err) {
        showFeedback('Innlogging feilet: ' + err.message);
      }
    });
  </script>
</body>
</html>
