<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CryptoChat</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
.page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0b0c12; }
.container-center { width:100%; max-width:400px; padding:24px; }
.auth-card { background:#111322; border:1px solid #151d30; border-radius:16px; padding:32px 28px; }
.brand { text-align:center; margin-bottom:24px; }
.brand h1 { margin:0; font-size:1.8rem; color:#cf6fef; }
.subtitle { color:#7c7e9a; font-size:.9rem; margin-top:4px; }
.tabs { display:flex; gap:0; margin-bottom:20px; background:#0a0c18; border-radius:10px; overflow:hidden; }
.tab-btn { flex:1; padding:10px; border:none; background:transparent; color:#7c7e9a; font-weight:600; cursor:pointer; transition:all .2s; }
.tab-btn.active { background:#1c1030; color:#f3f1ff; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:.8rem; color:#7c7e9a; margin-bottom:4px; }
.field input { width:100%; padding:10px 12px; background:#0a0c18; color:#f0f0ff; border:1px solid #232540; border-radius:10px; font-size:.95rem; }
.field input:focus { outline:none; border-color:#5b5cf5; }
.actions { margin-top:20px; }
.btn { display:inline-flex; align-items:center; justify-content:center; width:100%; padding:12px; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:.95rem; transition:all .15s; }
.btn-primary { background:linear-gradient(135deg,#7a3bff,#cf6fef); color:#fff; }
.btn-primary:hover { opacity:.9; transform:translateY(-1px); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.feedback { display:none; margin-top:12px; padding:10px; border-radius:8px; font-size:.85rem; text-align:center; }
.feedback.error { background:#3d1212; color:#ffb3b3; }
.feedback.success { background:#14301a; color:#a3ffb3; }
.feedback.loading { background:#1a1c30; color:#cfcfef; }
  </style>
</head>
<body>
  <main class="page">
    <div class="container-center">
      <div class="auth-card">
        <div class="brand">
          <h1>CryptoChat</h1>
          <p class="subtitle">Ende-til-ende-kryptert meldinger</p>
        </div>
        <div class="tabs">
          <button class="tab-btn active" id="tab-register" onclick="switchTab('register')">Registrer</button>
          <button class="tab-btn" id="tab-login" onclick="switchTab('login')">Logg inn</button>
        </div>

        <form id="form-register">
          <div class="field">
            <label for="register-username">Brukernavn</label>
            <input id="register-username" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="register-password">Passord</label>
            <input id="register-password" type="password" autocomplete="new-password" required />
            <div style="font-size:.72rem;color:#7c7e9a;margin-top:4px;">Minst 10 tegn med store og små bokstaver, tall og spesialtegn (!@#$%...)</div>
          </div>
          <div class="actions">
            <button class="btn btn-primary" type="submit">Registrer</button>
          </div>
        </form>

        <form id="form-login" style="display:none;">
          <div class="field">
            <label for="login-username">Brukernavn</label>
            <input id="login-username" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="login-password">Passord</label>
            <input id="login-password" type="password" autocomplete="current-password" required />
          </div>
          <div class="actions">
            <button class="btn btn-primary" type="submit">Logg inn</button>
          </div>
        </form>

        <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
      </div>
    </div>
  </main>

  <script>
    function showFeedback(message, type = 'error') {
      const el = document.getElementById('feedback');
      el.textContent = message;
      el.className = 'feedback ' + type;
      el.style.display = 'block';
    }

    function switchTab(tab) {
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('feedback').style.display = 'none';
    }

    async function postJSON(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {}),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || data.error || `HTTP ${res.status}`);
      return data;
    }

    document.getElementById('form-register').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('register-username').value.trim();
      const password = document.getElementById('register-password').value;
      try {
        showFeedback('Registrerer...', 'loading');
        await postJSON('/auth/register', { username, password });
        showFeedback('Registrert! Logger inn...', 'success');
        setTimeout(() => {
          window.location.href = '/chat';
        }, 500);
      } catch (err) {
        showFeedback('Registrering feilet: ' + err.message);
      }
    });

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      try {
        showFeedback('Logger inn...', 'loading');
        await postJSON('/auth/login', { username, password });
        window.location.href = '/chat';
      } catch (err) {
        showFeedback('Innlogging feilet: ' + err.message);
      }
    });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
  </script>
</body>
</html>
